[project]
name = "simultaneous-fee-instrument"
authors = ["Protocol Labs <engineering@protocollabs.com>"]
description = "A decentralized financial coordination protocol for concurrent fee management"
telemetry = false
requirements = []

[contracts.fee-coordinator]
path = "contracts/fee-coordinator.clar"
depends_on = []

[contracts.token-synchronizer]
path = "contracts/token-synchronizer.clar"
depends_on = []

[contracts.treasury-manager]
path = "contracts/treasury-manager.clar"
depends_on = []

[contracts.distribution-engine]
path = "contracts/distribution-engine.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
